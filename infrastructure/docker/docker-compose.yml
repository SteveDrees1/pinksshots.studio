services:
  postgres:
    image: postgres:16-alpine
    container_name: pinkshots-db
    environment:
      POSTGRES_USER: pinkshots
      POSTGRES_PASSWORD: pinkshots
      POSTGRES_DB: pinkshots
    ports:
      - "5432:5432"
    volumes:
      - pinkshots_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinkshots"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pinkshots_pgdata:
